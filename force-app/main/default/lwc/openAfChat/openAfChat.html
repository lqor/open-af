<template>
    <div class="page">
        <div class="layout">
            <!-- Sidebar for conversation history -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h2>Open AF</h2>
                    <button class="new-chat-btn" onclick={handleNewConversation}>
                        <span>+</span> New chat
                    </button>
                </div>
                <div class="conversation-list">
                    <template for:each={conversations} for:item="conv">
                        <button
                            key={conv.id}
                            class={conv.className}
                            data-id={conv.id}
                            onclick={handleConversationSelect}
                        >
                            <span class="conv-name">{conv.name}</span>
                            <span class="conv-status">{conv.status}</span>
                        </button>
                    </template>
                    <template if:false={hasConversations}>
                        <div class="empty-conversations">
                            No conversations yet
                        </div>
                    </template>
                </div>
            </aside>

            <!-- Main chat area -->
            <main class="chat-area">
                <template if:true={error}>
                    <div class="error-banner">{error}</div>
                </template>

                <!-- Chat messages -->
                <div class="chat-messages" id="chatMessages">
                    <template for:each={displayMessages} for:item="message">
                        <article key={message.id} class={message.className}>
                            <div class="message-content">
                                <template if:true={message.isToolCall}>
                                    <div class="tool-call-indicator">
                                        <span class="tool-icon">⚡</span>
                                        <span class="tool-name">{message.toolName}</span>
                                    </div>
                                </template>
                                <template if:false={message.isToolCall}>
                                    <pre>{message.content}</pre>
                                </template>
                            </div>
                        </article>
                    </template>
                    <template if:false={hasMessages}>
                        <div class="welcome-message">
                            <h1>Open AF Agent</h1>
                            <p>Ask about records, schema, or org structure. I'll answer directly or call tools when needed.</p>
                            <div class="suggestions">
                                <template for:each={promptSuggestions} for:item="suggestion">
                                    <button
                                        key={suggestion}
                                        class="suggestion-chip"
                                        data-prompt={suggestion}
                                        onclick={handleSuggestionClick}
                                    >
                                        {suggestion}
                                    </button>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Chat input -->
                <div class="chat-input">
                    <div class="input-container">
                        <lightning-textarea
                            class="message-input"
                            value={prompt}
                            oninput={handlePromptChange}
                            onchange={handlePromptChange}
                            onkeydown={handlePromptKeydown}
                            placeholder="Message Open AF..."
                        ></lightning-textarea>
                        <button
                            class="send-button"
                            onclick={handleSend}
                            disabled={isSendDisabled}
                        >
                            <span>↑</span>
                        </button>
                    </div>
                    <div class="input-hint">
                        Press Enter to send, Shift+Enter for new line
                    </div>
                    <template if:true={canCancel}>
                        <button class="cancel-button" onclick={handleCancelRun}>
                            Cancel
                        </button>
                    </template>
                </div>

                <!-- Tool executions (hidden by default) -->
                <template if:true={showToolTrace}>
                    <div class="tool-trace">
                        <div class="tool-trace-header">
                            <h3>Tool Trace ({toolExecutions.length})</h3>
                        <button class="collapse-btn" onclick={toggleToolTrace}>
                            {toolTraceButtonLabel}
                        </button>
                        </div>
                        <div class="tool-trace-content">
                            <template for:each={toolExecutions} for:item="tool">
                                <article key={tool.id} class="tool-row">
                                    <header>
                                        <span>{tool.toolName}</span>
                                        <small>{tool.status}</small>
                                    </header>
                                    <details>
                                        <summary>Input</summary>
                                        <pre>{tool.inputJson}</pre>
                                    </details>
                                    <details>
                                        <summary>Output</summary>
                                        <pre>{tool.outputJson}</pre>
                                    </details>
                                    <template if:true={tool.error}>
                                        <div class="tool-error">{tool.error}</div>
                                    </template>
                                </article>
                            </template>
                        </div>
                    </div>
                </template>
            </main>
        </div>
    </div>
</template>
